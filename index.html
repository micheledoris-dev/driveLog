<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>driveLog Pro</title>
    <style>
        :root { --accent: #006064; --bg: #ffffff; --text: #1a1a1a; --muted: #8e8e93; --line: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        
        /* Header compatto stile lusso */
        header { padding: 40px 25px 20px; background: #f9f9f9; border-bottom: 1px solid var(--line); }
        .logo { font-size: 0.9rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: #333; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Card Auto - Pulita ma Informativa (Ispirata a Foto 101) */
        .car-item { margin-bottom: 30px; }
        .car-header { font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; border-bottom: 2px solid var(--text); padding-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 0.9rem; }
        .label { color: var(--muted); text-transform: uppercase; font-size: 0.7rem; font-weight: 700; }
        .val { font-weight: 600; }

        /* Form Minimal */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ccc; font-size: 1rem; border-radius: 0; background: transparent; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* Barra Navigazione Sospesa (La migliore delle versioni) */
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); height: 70px; border-radius: 25px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--line); }
        .nav-btn { flex: 1; text-align: center; color: var(--muted); cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); transform: translateY(-3px); }
        .nav-btn div { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
    </style>
</head>
<body>

<header><div class="logo">driveLog Elite</div></header>

<div class="container">
    <div id="v-home" class="view active">
        <div id="car-list"></div>
        <button class="btn-main" style="background:#333" onclick="showView('v-add')">+ AGGIUNGI VEICOLO</button>
    </div>

    <div id="v-input" class="view">
        <h2 style="font-weight: 800;">Nuovo Inserimento</h2>
        <div class="input-group">
            <label>Categoria</label>
            <select id="cat" onchange="toggleFields()">
                <option value="GAS">⛽ Rifornimento</option>
                <option value="MAN">🔧 Manutenzione</option>
                <option value="SPE">💳 Spesa (Bollo/RCA/Rev)</option>
            </select>
        </div>
        <div id="fields-gas">
            <div class="input-group"><label>Litri</label><input type="number" id="lit"></div>
            <div class="input-group"><label>Prezzo/L</label><input type="number" id="pre"></div>
        </div>
        <div id="fields-common">
            <div class="input-group"><label>Costo Totale €</label><input type="number" id="tot"></div>
            <div class="input-group"><label>Note / Descrizione</label><input type="text" id="desc" placeholder="es. Tagliando o RCA"></div>
        </div>
        <button class="btn-main" onclick="saveData()">SALVA NELLO STORICO</button>
    </div>

    <div id="v-report" class="view">
        <h2 style="font-weight: 800;">Report Spese</h2>
        <div id="report-stats"></div>
    </div>

    <div id="v-add" class="view">
        <h2 style="font-weight: 800;">Nuovo Veicolo</h2>
        <div class="input-group"><label>Nome Auto</label><input type="text" id="a-nome"></div>
        <div class="input-group"><label>Targa</label><input type="text" id="a-targa"></div>
        <button class="btn-main" onclick="saveAuto()">SALVA AUTO</button>
    </div>
</div>

<div class="nav-dock">
    <div class="nav-btn active" onclick="showView('v-home', this)"><span>🏠</span><div>Garage</div></div>
    <div class="nav-btn" onclick="showView('v-input', this)"><span>➕</span><div>Inserisci</div></div>
    <div class="nav-btn" onclick="showView('v-report', this)"><span>📊</span><div>Report</div></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dlog_final')) || { auto: [], log: [] };

    function showView(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'v-report') renderReport();
    }

    function saveAuto() {
        db.auto.push({ nome: document.getElementById('a-nome').value, targa: document.getElementById('a-targa').value });
        localStorage.setItem('dlog_final', JSON.stringify(db));
        renderHome(); showView('v-home');
    }

    function saveData() {
        let cat = document.getElementById('cat').value;
        let costo = document.getElementById('tot').value;
        if(cat === 'GAS') costo = document.getElementById('lit').value * document.getElementById('pre').value;
        
        db.log.push({ cat, costo: parseFloat(costo), desc: document.getElementById('desc').value, date: new Date().toLocaleDateString() });
        localStorage.setItem('dlog_final', JSON.stringify(db));
        alert("Salvato!"); showView('v-home');
    }

    function renderHome() {
        document.getElementById('car-list').innerHTML = db.auto.map(a => `
            <div class="car-item">
                <div class="car-header">${a.nome}</div>
                <div class="data-row"><span class="label">Targa</span><span class="val">${a.targa}</span></div>
                <div class="data-row"><span class="label">Stato Scadenze</span><span class="val" style="color:var(--accent)">In regola</span></div>
            </div>
        `).join('');
    }

    function renderReport() {
        let total = db.log.reduce((s, item) => s + item.costo, 0);
        document.getElementById('report-stats').innerHTML = `
            <div style="background:#f9f9f9; padding:30px; border-radius:20px; text-align:center; margin-bottom:20px">
                <div class="label">Spesa Totale Cumulata</div>
                <div style="font-size:2.2rem; font-weight:800; color:var(--accent)">€ ${total.toFixed(2)}</div>
            </div>
        `;
    }

    function toggleFields() {
        document.getElementById('fields-gas').style.display = (document.getElementById('cat').value === 'GAS') ? 'block' : 'none';
    }

    renderHome();
</script>
</body>
</html>
