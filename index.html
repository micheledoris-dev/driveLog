<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>driveLog - Gestione Auto</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* Stili ripresi dai tuoi screenshot per coerenza visiva */
        :root { --primary: #667eea; --secondary: #764ba2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; text-align: left; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
        .label { font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .value { font-weight: bold; font-size: 1rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; float: right; }
        .modal { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: 50px auto; border: 1px solid #ddd; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <h1>driveLog</h1>
    <p>micheledoris@gmail.com</p>
</div>

<div class="container">
    <button class="btn-add" onclick="apriModalAuto()">+ Aggiungi Auto</button>
    <h2>Le Mie Auto</h2>
    <div id="listaAuto"></div>

    <hr>

    <h2>Rifornimenti</h2>
    <button class="btn-add" onclick="apriModalRifornimento()">Nuovo Rifornimento</button>
    <div id="listaRifornimenti"></div>
</div>

<div id="modalAuto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div class="modal">
        <h3>Aggiungi Nuova Auto</h3>
        <input type="text" id="autoNome" placeholder="Marca e Modello (es. Alfa Romeo Stelvio)">
        <input type="text" id="autoTarga" placeholder="Targa">
        
        <label class="label">Alimentazione</label>
        <select id="autoAlimentazione">
            <option value="Diesel">Diesel</option>
            <option value="Benzina">Benzina</option>
            <option value="Metano">Metano</option>
            <option value="GPL">GPL</option>
            <option value="Benzina + GPL">Benzina + GPL</option>
            <option value="Benzina + Metano">Benzina + Metano</option>
            <option value="Elettrica">Elettrica</option>
        </select>

        <label class="label">Data Immatricolazione</label>
        <input type="date" id="dataImm">
        
        <label class="label">Scadenza Bollo</label>
        <input type="date" id="scadenzaBollo">
        
        <label class="label">Scadenza RCA</label>
        <input type="date" id="scadenzaRCA">

        <button onclick="salvaAuto()" style="background:var(--primary); color:white; border:none; padding:10px; width:100%; border-radius:5px;">Salva Auto</button>
        <button onclick="chiudiModal()" style="background:#ccc; border:none; padding:10px; width:100%; border-radius:5px; margin-top:5px;">Annulla</button>
    </div>
</div>

<div id="modalRifornimento" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div class="modal">
        <h3>Nuovo Rifornimento</h3>
        <label class="label">Seleziona Auto</label>
        <select id="selectAutoRif"></select> <label class="label">Litri / Kg</label>
        <input type="number" id="rifLitri" placeholder="0.00">
        
        <label class="label">Prezzo Unitario (€)</label>
        <input type="number" id="rifPrezzo" placeholder="0.000">

        <button onclick="salvaRifornimento()" style="background:var(--primary); color:white; border:none; padding:10px; width:100%; border-radius:5px;">Salva Rifornimento</button>
        <button onclick="chiudiModal()" style="background:#ccc; border:none; padding:10px; width:100%; border-radius:5px; margin-top:5px;">Annulla</button>
    </div>
</div>

<script>
    let autoSavlata = JSON.parse(localStorage.getItem('auto')) || [];

    function apriModalAuto() { document.getElementById('modalAuto').style.display = 'block'; }
    function apriModalRifornimento() { 
        const select = document.getElementById('selectAutoRif');
        select.innerHTML = ""; // Pulisce
        autoSavlata.forEach(a => {
            let opt = document.createElement('option');
            opt.value = a.nome;
            opt.innerHTML = a.nome;
            select.appendChild(opt);
        });
        document.getElementById('modalRifornimento').style.display = 'block'; 
    }
    function chiudiModal() { 
        document.getElementById('modalAuto').style.display = 'none'; 
        document.getElementById('modalRifornimento').style.display = 'none'; 
    }

    function salvaAuto() {
        const nuovaAuto = {
            nome: document.getElementById('autoNome').value,
            targa: document.getElementById('autoTarga').value,
            alimentazione: document.getElementById('autoAlimentazione').value,
            immatricolazione: document.getElementById('dataImm').value,
            bollo: document.getElementById('scadenzaBollo').value,
            rca: document.getElementById('scadenzaRCA').value
        };
        autoSavlata.push(nuovaAuto);
        localStorage.setItem('auto', JSON.stringify(autoSavlata));
        chiudiModal();
        renderizzaTutto();
    }

    function renderizzaTutto() {
        const lista = document.getElementById('listaAuto');
        lista.innerHTML = "";
        autoSavlata.forEach(a => {
            lista.innerHTML += `
                <div class="card">
                    <div style="font-weight:bold; font-size:1.2rem;">${a.nome}</div>
                    <div style="color:#666; font-size:0.9rem; margin-bottom:10px;">${a.targa}</div>
                    <div class="grid">
                        <div><div class="label">Alimentazione</div><div class="value">${a.alimentazione}</div></div>
                        <div><div class="label">Immatricolazione</div><div class="value">${a.immatricolazione}</div></div>
                        <div><div class="label">Scad. Bollo</div><div class="value">${a.bollo}</div></div>
                        <div><div class="label">Scad. RCA</div><div class="value">${a.rca}</div></div>
                    </div>
                </div>
            `;
        });
    }

    renderizzaTutto();
</script>

</body>
</html>
