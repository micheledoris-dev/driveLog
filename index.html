// Calcolo automatico rifornimento
window.calculateFuelTotal = function() {
    const qty = parseFloat(document.getElementById('fuelQty').value) || 0;
    const price = parseFloat(document.getElementById('fuelPrice').value) || 0;
    if (qty > 0 && price > 0) {
        document.getElementById('fuelTotal').value = (qty * price).toFixed(2);
    }
};

// Aggiorna label rifornimento in base al tipo
document.getElementById('fuelType')?.addEventListener('change', function() {
    const type = this.value;
    const qtyLabel = document.getElementById('fuelQtyLabel');
    const priceLabel = document.getElementById('fuelPriceLabel');
    if (!qtyLabel || !priceLabel) return;
    if (type === 'Metano') {
        qtyLabel.textContent = 'Kg *';
        priceLabel.textContent = 'Prezzo/Kg (€)';
    } else {
        qtyLabel.textContent = 'Litri *';
        priceLabel.textContent = 'Prezzo/L (€)';
    }
});

                return;
            }

            const btn = document.getElementById('authBtn');
            btn.disabled = true;
            btn.textContent = 'Caricamento...';

            try {

                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                showSuccess(isLogin ? 'Login effettuato!' : 'Registrazione completata!');

            const alimentazione = document.getElementById('carAlimentazione').value;
            const targa = document.getElementById('carTarga').value.toUpperCase().trim();

            if (targa && !/^[A-Z]{2}[0-9]{3}[A-Z]{2}$/.test(targa)) {
                showError('Targa non valida! Formato: AB123CD');
                return;
            }

            const carData = {
                userId: currentUser.uid,
                marca,
                modello,
                alimentazione,
                targa: targa || null,
                anno: anno || null,
                km: km || null,
                revisione: revisione || null
            };

            try {
                if (editingCarId) {
                    await updateDoc(doc(db, 'cars', editingCarId), carData);
                    showAlert('Auto aggiornata!');
                } else {
                    await addDoc(collection(db, 'cars'), carData);
                    showAlert('Auto aggiunta!');

                closeCarModal();

                const car = cars.find(c => c.id === w.carId);
                return `
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">${w.type}</div>
                                <div class="card-subtitle">${car ? `${car.marca} ${car.modello}` : 'Auto non trovata'} • ${new Date(w.date).toLocaleDateString('it-IT')}</div>
                            </div>
                            <div class="card-actions">
                                <button class="icon-btn" onclick='openWashModal(${JSON.stringify(w).replace(/'/g, "&#39;")})'>✏️</button>
                                <button class="icon-btn" onclick="deleteWash('${w.id}')">🗑️</button>
                            </div>
                        </div>
                        <div class="info-grid">
                            ${w.cost ? `
                            <div class="info-box">
                                <div class="info-label">Costo</div>
                                <div class="info-value">€ ${w.cost.toFixed(2)}</div>
                            </div>` : ''}
                            ${w.place ? `
                            <div class="info-box">
                                <div class="info-label">Autolavaggio</div>
                                <div class="info-value">${w.place}</div>
                            </div>` : ''}
                            ${w.notes ? `
                            <div class="info-box" style="grid-column: 1 / -1;">
                                <div class="info-label">Note</div>
                                <div class="info-value">${w.notes}</div>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        };

        // STATISTICHE
        window.calculateStats = function() {
            const carId = document.getElementById('filterStatsCar').value;
            const container = document.getElementById('statsContent');
            
            if (!carId) {
                container.innerHTML = '<div class="empty"><p>Seleziona un\'auto per visualizzare le statistiche</p></div>';
                return;
            }

            const car = cars.find(c => c.id === carId);
            const carMaint = maintenance.filter(m => m.carId === carId);
            const carFuel = fuel.filter(f => f.carId === carId);
            const carWashes = washes.filter(w => w.carId === carId);

            // Totali
            const totalMaint = carMaint.reduce((sum, m) => sum + (m.cost || 0), 0);
            const totalFuel = carFuel.reduce((sum, f) => sum + f.totalCost, 0);
            const totalWashes = carWashes.reduce((sum, w) => sum + (w.cost || 0), 0);
            const totalAll = totalMaint + totalFuel + totalWashes;

            // Calcolo costo/km
            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Totale Manutenzioni</div>
                        <div class="stat-value">€ ${totalMaint.toFixed(2)}</div>
                        <div class="stat-subtitle">${carMaint.length} interventi</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Totale Carburante</div>
                        <div class="stat-value">€ ${totalFuel.toFixed(2)}</div>
                        <div class="stat-subtitle">${carFuel.length} rifornimenti</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Totale Lavaggi</div>
                        <div class="stat-value">€ ${totalWashes.toFixed(2)}</div>
                        <div class="stat-subtitle">${carWashes.length} lavaggi</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Totale Generale</div>
                        <div class="stat-value">€ ${totalAll.toFixed(2)}</div>
                    </div>
                </div>

                <div class="card">
                    <h4 style="margin-bottom: 20px;">Calcolo Costo/Km</h4>
                    
                    <div class="info-grid">
                        <div class="info-box">
                            <div class="info-label">Solo Carburante</div>
                            <div class="info-value">€ ${car.km ? (totalFuel / car.km).toFixed(3) : '0.000'} /km</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Carburante + Manutenzioni</div>
                            <div class="info-value">€ ${car.km ? ((totalFuel + totalMaint) / car.km).toFixed(3) : '0.000'} /km</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Totale (con lavaggi)</div>
                            <div class="info-value">€ ${car.km ? (totalAll / car.km).toFixed(3) : '0.000'} /km</div>
                        </div>
                    </div>

                    <h4 style="margin: 30px 0 20px;">Dettaglio Manutenzioni</h4>
                    <div class="info-grid">
                        ${carMaint.length > 0 ? carMaint.slice(0, 5).map(m => `
                            <div class="info-box">
                                <div class="info-label">${m.type}</div>
                                <div class="info-value">€ ${(m.cost || 0).toFixed(2)}</div>
                                <div class="card-subtitle">${new Date(m.date).toLocaleDateString('it-IT')}</div>
                            </div>
                        `).join('') : '<p>Nessuna manutenzione registrata</p>'}
                    </div>

                    <h4 style="margin: 30px 0 20px;">Consumo Carburante</h4>
                    <div class="info-grid">
                        <div class="info-box">
                            <div class="info-label">Totale ${car.alimentazione === 'Metano' ? 'Kg' : 'Litri'}</div>
                            <div class="info-value">${carFuel.reduce((sum, f) => sum + f.quantity, 0).toFixed(2)}</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Prezzo Medio/${car.alimentazione === 'Metano' ? 'Kg' : 'L'}</div>
                            <div class="info-value">€ ${carFuel.length > 0 ? (totalFuel / carFuel.reduce((sum, f) => sum + f.quantity, 0)).toFixed(3) : '0.000'}</div>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        };

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            ['Cars', 'Maintenance', 'Fuel', 'Washes', 'Stats'].forEach(t => {
                document.getElementById('tab' + t).classList.add('hidden');
            });
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');

            if (tab === 'stats') {
                calculateStats();
            }
        };

        function showAlert(msg) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.classList.add('active');
            setTimeout(() => alert.classList.remove('active'), 3000);
        }

        function showError(msg) {
            const error = document.getElementById('errorMsgDash') || document.getElementById('errorMsg');
            if (!error) { console.error(msg); return; }
            error.textContent = msg;
            error.classList.remove('hidden');
            setTimeout(() => error.classList.add('hidden'), 6000);
        }

        function showSuccess(msg) {
            const success = document.getElementById('successMsgDash') || document.getElementById('successMsg');
            if (!success) { console.log(msg); return; }
            success.textContent = msg;
            success.classList.remove('hidden');
            setTimeout(() => success.classList.add('hidden'), 3500);
        }
    </script>
</body>
</html>
