<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>driveLog Pro - micheledoris</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --secondary: #818cf8; --bg: #f3f4f6; --dark: #1f2937; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px; text-align: center; }
        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; sticky: top; z-index: 10; }
        .nav-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #6b7280; }
        .nav-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { max-width: 800px; margin: auto; padding: 15px; display: none; }
        .container.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-photo { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; margin-top: 5px; }
        label { font-size: 0.8rem; font-weight: bold; color: #4b5563; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; text-transform: uppercase; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .img-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; border: 2px dashed #ddd; }
        .scadenza-item { background: #f9fafb; padding: 8px; border-radius: 5px; margin-bottom: 5px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>driveLog Pro</h1>
    <p>micheledoris@gmail.com</p>
</div>

<div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab(0)">VEICOLI</div>
    <div class="nav-tab" onclick="switchTab(1)">ATTIVITÀ</div>
    <div class="nav-tab" onclick="switchTab(2)">REPORT 📊</div>
</div>

<div id="tab-0" class="container active">
    <button class="btn btn-main" onclick="openM('modalAuto')">+ AGGIUNGI NUOVA AUTO</button>
    <div id="listaAuto" style="margin-top:20px"></div>
</div>

<div id="tab-1" class="container">
    <div class="grid-2">
        <button class="btn btn-main" onclick="openAct('rif')">⛽ RIFORNIMENTO</button>
        <button class="btn btn-main" style="background:#f59e0b" onclick="openAct('man')">🔧 MANUTENZIONE</button>
    </div>
    <button class="btn btn-main" style="background:#06b6d4" onclick="openAct('lav')">🧼 LAVAGGIO</button>
    <button class="btn" style="background:#107c10; color:white" onclick="exportExcel()">📊 SCARICA EXCEL</button>
    <div id="logAttivita" style="margin-top:20px"></div>
</div>

<div id="tab-2" class="container">
    <div class="card">
        <h3>Spese Totali per Auto</h3>
        <canvas id="barChart"></canvas>
    </div>
</div>

<div id="modalAuto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; overflow-y:auto">
    <div style="background:white; margin:15px; padding:20px; border-radius:15px">
        <h3>Dati Veicolo</h3>
        <input type="text" id="aNome" placeholder="MARCA E MODELLO (ES: KIA SPORTAGE)">
        <input type="text" id="aTarga" placeholder="TARGA (ES: GA789FR)" maxlength="7">
        <select id="aAlim">
            <option>BENZINA</option><option>DIESEL</option>
            <option>BENZINA + GPL</option><option>BENZINA + METANO</option>
        </select>

        <div class="card" style="background:#f0f4ff">
            <div class="grid-2">
                <div><label>DATA BOLLO</label><input type="date" id="dBol"></div>
                <div><label>COSTO BOLLO €</label><input type="number" id="cBol" placeholder="0.00"></div>
            </div>
            <div class="grid-2">
                <div><label>DATA RCA</label><input type="date" id="dRca"></div>
                <div><label>COSTO RCA €</label><input type="number" id="cRca" placeholder="0.00"></div>
            </div>
            <div class="grid-2">
                <div><label>DATA REVISIONE</label><input type="date" id="dRev"></div>
                <div><label>COSTO REVISIONE €</label><input type="number" id="cRev" placeholder="0.00"></div>
            </div>
        </div>

        <button class="btn btn-photo" onclick="document.getElementById('inPhoto').click()">📸 SCATTA FOTO AUTO</button>
        <input type="file" id="inPhoto" accept="image/*" capture="camera" style="display:none" onchange="preview(this, 'preAuto')">
        <img id="preAuto" class="img-preview">
        
        <button class="btn btn-main" onclick="saveAuto()">SALVA VEICOLO</button>
        <button class="btn btn-danger" onclick="closeM()">CHIUDI</button>
    </div>
</div>

<div id="modalAct" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100;">
    <div style="background:white; margin:15px; padding:20px; border-radius:15px">
        <h3 id="actTitle">Nuova Attività</h3>
        <select id="actAuto"></select>
        <input type="text" id="actDesc" placeholder="DESCRIZIONE (ES: PIENO GPL)">
        <input type="number" id="actCosto" placeholder="COSTO TOTALE €">
        
        <button class="btn btn-photo" onclick="document.getElementById('inScontrino').click()">📸 FOTO SCONTRINO</button>
        <input type="file" id="inScontrino" accept="image/*" capture="camera" style="display:none" onchange="preview(this, 'preSco')">
        <img id="preSco" class="img-preview">

        <button class="btn btn-main" onclick="saveAct()">REGISTRA</button>
        <button class="btn btn-danger" onclick="closeM()">ANNULLA</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dlog_vPro')) || { auto: [], log: [] };
    let tempFoto = "";

    function switchTab(n) {
        document.querySelectorAll('.container').forEach((c, i) => c.classList.toggle('active', i === n));
        document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === n));
        if(n === 2) renderChart();
    }

    function openM(id) { document.getElementById(id).style.display = 'block'; }
    function closeM() { 
        document.querySelectorAll('[id^="modal"]').forEach(m => m.style.display='none');
        tempFoto = "";
        document.querySelectorAll('.img-preview').forEach(i => i.style.display='none');
    }

    function preview(input, id) {
        const reader = new FileReader();
        reader.onload = (e) => {
            tempFoto = e.target.result;
            const img = document.getElementById(id);
            img.src = tempFoto;
            img.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveAuto() {
        const a = {
            id: Date.now(),
            nome: document.getElementById('aNome').value.toUpperCase(),
            targa: document.getElementById('aTarga').value.toUpperCase(),
            alim: document.getElementById('aAlim').value,
            bolloD: document.getElementById('dBol').value,
            bolloC: parseFloat(document.getElementById('cBol').value || 0),
            rcaD: document.getElementById('dRca').value,
            rcaC: parseFloat(document.getElementById('cRca').value || 0),
            revD: document.getElementById('dRev').value,
            revC: parseFloat(document.getElementById('cRev').value || 0),
            foto: tempFoto
        };
        db.auto.push(a);
        localStorage.setItem('dlog_vPro', JSON.stringify(db));
        renderAuto();
        closeM();
    }

    function openAct(type) {
        document.getElementById('actTitle').innerText = type.toUpperCase();
        const sel = document.getElementById('actAuto');
        sel.innerHTML = db.auto.map(a => `<option value="${a.nome}">${a.nome}</option>`).join('');
        openM('modalAct');
    }

    function saveAct() {
        const entry = {
            data: new Date().toLocaleDateString(),
            auto: document.getElementById('actAuto').value,
            tipo: document.getElementById('actTitle').innerText,
            desc: document.getElementById('actDesc').value.toUpperCase(),
            costo: parseFloat(document.getElementById('actCosto').value || 0),
            foto: tempFoto
        };
        db.log.push(entry);
        localStorage.setItem('dlog_vPro', JSON.stringify(db));
        renderLog();
        closeM();
    }

    function renderAuto() {
        document.getElementById('listaAuto').innerHTML = db.auto.map(a => `
            <div class="card">
                ${a.foto ? `<img src="${a.foto}" style="width:100%; height:150px; object-fit:cover; border-radius:10px">` : ''}
                <h3>${a.nome} <span style="color:blue; font-size:0.9rem">${a.targa}</span></h3>
                <div class="scadenza-item">📅 BOLLO: ${a.bolloD} - € ${a.bolloC}</div>
                <div class="scadenza-item">📅 RCA: ${a.rcaD} - € ${a.rcaC}</div>
                <div class="scadenza-item">📅 REVISIONE: ${a.revD} - € ${a.revC}</div>
                <button class="btn btn-danger" onclick="deleteAuto(${a.id})" style="width:auto; padding:5px 10px">Elimina Auto</button>
            </div>
        `).join('');
    }

    function renderLog() {
        document.getElementById('logAttivita').innerHTML = db.log.slice().reverse().map(l => `
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center">
                <span><b>${l.data}</b><br>${l.auto} - ${l.tipo}</span>
                <span style="font-weight:bold; color:green">€ ${l.costo.toFixed(2)}</span>
            </div>
        `).join('');
    }

    function deleteAuto(id) {
        if(confirm("Sei sicuro? Perderai tutti i dati dell'auto.")) {
            db.auto = db.auto.filter(a => a.id !== id);
            localStorage.setItem('dlog_vPro', JSON.stringify(db));
            renderAuto();
        }
    }

    function renderChart() {
        const ctx = document.getElementById('barChart').getContext('2d');
        const data = db.auto.map(a => {
            const spesaLog = db.log.filter(l => l.auto === a.nome).reduce((s, c) => s + c.costo, 0);
            return spesaLog + a.bolloC + a.rcaC + a.revC;
        });
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: db.auto.map(a => a.nome),
                datasets: [{ label: 'Spesa Totale (€)', data: data, backgroundColor: '#4f46e5' }]
            }
        });
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(db.log);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Storico");
        XLSX.writeFile(wb, "driveLog_Dati.xlsx");
    }

    renderAuto();
    renderLog();
</script>
</body>
</html>
