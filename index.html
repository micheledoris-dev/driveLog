<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>driveLog Pro - micheledoris</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Stili aggiornati e moderni */
        :root { --primary: #4f46e5; --secondary: #818cf8; --bg: #f3f4f6; --dark: #1f2937; --card-bg: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding-bottom: 60px; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px 30px; }
        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .nav-tab { padding: 15px 25px; cursor: pointer; font-weight: 600; color: #6b7280; border-bottom: 3px solid transparent; }
        .nav-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { max-width: 1200px; margin: auto; padding: 20px; display: none; }
        .container.active { display: block; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
        .btn-main { background: var(--primary); color: white; }
        .btn-photo { background: #10b981; color: white; margin-top: 10px; width: 100%; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 90%; max-width: 550px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #d1d5db; border-radius: 8px; text-transform: uppercase; }
        .label { font-weight: bold; font-size: 0.85rem; color: #6b7280; }
        .img-preview { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; background: #e5e7eb; margin-top: 10px; display: none; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>driveLog <span style="font-weight: 200;">Pro</span></h1>
    <p><i class="fas fa-user-circle"></i> micheledoris@gmail.com</p>
</div>

<div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab(0)">AUTO</div>
    <div class="nav-tab" onclick="switchTab(1)">ATTIVITÀ</div>
    <div class="nav-tab" onclick="switchTab(2)">STATISTICHE 📊</div>
</div>

<div id="tab-auto" class="container active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2>Le Mie Auto</h2>
        <button class="btn btn-main" onclick="openAutoModal()">+ AGGIUNGI AUTO</button>
    </div>
    <div id="listaAuto" class="car-grid"></div>
</div>

<div id="tab-attivita" class="container">
    <h2>Registra Nuova Attività</h2>
    <div class="grid-4" style="margin-bottom:30px">
        <button class="btn btn-main" style="background:#4f46e5" onclick="prepareM('modalRif')"><i class="fas fa-gas-pump"></i> Rifornimento</button>
        <button class="btn btn-main" style="background:#f59e0b" onclick="prepareM('modalMaint')"><i class="fas fa-tools"></i> Manutenzione</button>
        <button class="btn btn-main" style="background:#06b6d4" onclick="prepareM('modalWash')"><i class="fas fa-car-wash"></i> Lavaggio</button>
    </div>
    <div class="card">
        <h3>Storico Recente</h3>
        <button class="btn" style="background:#107c10; color:white; margin-bottom:15px" onclick="exportToExcel()">EXCEL 📊</button>
        <div id="logAttivita"></div>
    </div>
</div>

<div id="tab-stats" class="container">
    <h2>Report e Grafici 📊</h2>
    <div class="card">
        <h3>Spesa Mensile Totale per Auto</h3>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>
    <div class="card">
        <h3>Divisione dei Costi</h3>
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
    </div>
</div>

<div id="modalAuto" class="modal">
    <div class="modal-content">
        <h3>Registra Veicolo</h3>
        <input type="text" id="aNome" placeholder="ES: ALFA ROMEO STELVIO">
        <input type="text" id="aTarga" placeholder="ES: GA789FR" maxlength="7">
        <label class="label">Alimentazione</label>
        <select id="aAlim">
            <option>BENZINA</option><option>DIESEL</option>
            <option>BENZINA + GPL</option><option>BENZINA + METANO</option>
        </select>
        <label class="label">Km Attuali</label><input type="number" id="aKm">
        
        <label class="label">Foto Veicolo</label>
        <button class="btn btn-photo" onclick="takePhoto('aPhoto')"><i class="fas fa-camera"></i> SCATTA FOTO AUTO</button>
        <img id="aPhotoPreview" class="img-preview">
        <input type="hidden" id="aPhotoData">

        <button class="btn btn-main" onclick="saveAuto()" style="width:100%; margin-top:20px">SALVA</button>
        <button class="btn" onclick="closeM()" style="width:100%; margin-top:10px;">ANNULLA</button>
    </div>
</div>

<div id="modalRif" class="modal">
    <div class="modal-content">
        <h3>Nuovo Rifornimento</h3>
        <label class="label">Auto</label><select id="rSelAuto" class="selAutoList"></select>
        <label class="label">Litri / Kg</label><input type="number" id="rQty" step="0.01">
        <label class="label">Prezzo Unitario (€)</label><input type="number" id="rPrice" step="0.001">
        
        <label class="label">Foto Scontrino</label>
        <button class="btn btn-photo" onclick="takePhoto('rPhoto')"><i class="fas fa-receipt"></i> FOTO SCONTRINO</button>
        <img id="rPhotoPreview" class="img-preview">
        <input type="hidden" id="rPhotoData">

        <button class="btn btn-main" onclick="saveRif()" style="width:100%; margin-top:15px;">SALVA</button>
        <button class="btn" onclick="closeM()" style="width:100%; margin-top:10px;">CHIUDI</button>
    </div>
</div>

<div id="modalMaint" class="modal"><div class="modal-content"><h3>Manutenzione</h3><label class="label">Auto</label><select id="mSelAuto" class="selAutoList"></select><input type="text" id="mDesc" placeholder="Descrizione"><input type="number" id="mCosto" placeholder="Costo €"><button class="btn btn-main" onclick="saveMaint()">SALVA</button><button class="btn" onclick="closeM()">ESCI</button></div></div>
<div id="modalWash" class="modal"><div class="modal-content"><h3>Lavaggio</h3><label class="label">Auto</label><select id="wSelAuto" class="selAutoList"></select><select id="wTipo"><option>INTERNO</option><option>ESTERNO</option><option>COMPLETO</option></select><input type="number" id="wCosto" placeholder="Costo €"><button class="btn btn-main" onclick="saveWash()">SALVA</button><button class="btn" onclick="closeM()">ESCI</button></div></div>

<input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none">

<script>
    // Database locale
    let db = JSON.parse(localStorage.getItem('dlog_v4')) || { auto: [], log: [] };
    let barChart, pieChart; // Istanze dei grafici

    // Gestione Tab
    function switchTab(index) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.container')[index].classList.add('active');
        document.querySelectorAll('.nav-tab')[index].classList.add('active');
        if(index === 2) renderCharts(); // Carica i grafici solo quando apri la scheda
    }

    // Gestione Modali e Foto
    function openAutoModal() { resetForms(); openM('modalAuto'); }
    function openM(id) { document.getElementById(id).style.display = 'block'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); resetForms(); }
    
    function resetForms() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.querySelectorAll('.img-preview').forEach(img => img.style.display = 'none');
        document.querySelectorAll('input[type="hidden"]').forEach(h => h.value = "");
    }

    // Logica Fotocamera (Usa l'input file HTML5 nativo per massima compatibilità mobile)
    let currentPhotoTarget = '';
    function takePhoto(targetPrefix) {
        currentPhotoTarget = targetPrefix;
        document.getElementById('cameraInput').click();
    }

    document.getElementById('cameraInput').onchange = function(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            // Mostra anteprima
            const img = document.getElementById(currentPhotoTarget + 'Preview');
            img.src = base64Data;
            img.style.display = 'block';
            // Salva dati nel campo nascosto
            document.getElementById(currentPhotoTarget + 'Data').value = base64Data;
        };
        reader.readAsDataDataURL(file);
    };

    // Preparazione liste auto nei modali
    function prepareM(id) {
        const lists = document.querySelectorAll('.selAutoList');
        lists.forEach(l => l.innerHTML = db.auto.map(a => `<option value="${a.id}">${a.nome}</option>`).join(''));
        openM(id);
    }

    // SALVATAGGIO DATI
    function saveAuto() {
        const a = {
            id: Date.now(),
            nome: document.getElementById('aNome').value.toUpperCase(),
            targa: document.getElementById('aTarga').value.toUpperCase(),
            alim: document.getElementById('aAlim').value,
            km: document.getElementById('aKm').value,
            photo: document.getElementById('aPhotoData').value // Salva la foto base64
        };
        db.auto.push(a);
        update();
    }

    function saveRif() {
        const auto = db.auto.find(a => a.id == document.getElementById('rSelAuto').value);
        const q = parseFloat(document.getElementById('rQty').value);
        const p = parseFloat(document.getElementById('rPrice').value);
        db.log.push({ data: new Date().toISOString(), tipo: 'RIFORNIMENTO', auto: auto.nome, costo: q * p, photo: document.getElementById('rPhotoData').value });
        update();
    }
    
    // Semplificati per brevità, aggiungi foto se vuoi come sopra
    function saveMaint() { saveGeneric('MANUTENZIONE', 'mSelAuto', 'mDesc', 'mCosto'); }
    function saveWash() { saveGeneric('LAVAGGIO', 'wSelAuto', 'wTipo', 'wCosto'); }
    
    function saveGeneric(tipo, idSel, idDesc, idCosto) {
        const auto = db.auto.find(a => a.id == document.getElementById(idSel).value);
        db.log.push({ data: new Date().toISOString(), tipo: tipo, auto: auto.nome, costo: parseFloat(document.getElementById(idCosto).value || 0) });
        update();
    }

    // Aggiornamento interfaccia e Storage
    function update() {
        localStorage.setItem('dlog_v4', JSON.stringify(db));
        renderAuto();
        renderLog();
        closeM();
    }

    // RENDER INTERFACCIA
    function renderAuto() {
        document.getElementById('listaAuto').innerHTML = db.auto.map(a => `
            <div class="card">
                ${a.photo ? `<img src="${a.photo}" style="width:100%; height:150px; object-fit:cover; border-radius:8px; margin-bottom:10px">` : ''}
                <b>${a.nome}</b><br><span style="color:blue">${a.targa}</span><br>
                <span class="label">Alim:</span> ${a.alim}<br>
                <span class="label">Km:</span> ${a.km}
            </div>
        `).join('');
    }

    function renderLog() {
        document.getElementById('logAttivita').innerHTML = db.log.slice().reverse().map(l => `
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
                <span><b>${new Date(l.data).toLocaleDateString()}</b> - ${l.auto} (${l.tipo})</span>
                <span style="font-weight:bold">€ ${l.costo.toFixed(2)}</span>
            </div>
        `).join('');
    }

    // 📊 LOGICA GRAFICI (Chart.js)
    function renderCharts() {
        if(db.log.length === 0) return;

        // Prepara dati per grafico a barre (Spesa mensile)
        const monthlyData = {};
        db.log.forEach(l => {
            const date = new Date(l.data);
            const key = `${date.getFullYear()}-${date.getMonth()+1}`;
            if(!monthlyData[key]) monthlyData[key] = { rif: 0, maint: 0, wash: 0 };
            if(l.tipo === 'RIFORNIMENTO') monthlyData[key].rif += l.costo;
            if(l.tipo === 'MANUTENZIONE') monthlyData[key].maint += l.costo;
            if(l.tipo === 'LAVAGGIO') monthlyData[key].wash += l.costo;
        });

        const labels = Object.keys(monthlyData).sort();
        const rifSpesa = labels.map(k => monthlyData[k].rif);
        const maintSpesa = labels.map(k => monthlyData[k].maint);
        const washSpesa = labels.map(k => monthlyData[k].wash);

        if(barChart) barChart.destroy(); // Distruggi grafico vecchio prima di crearne uno nuovo
        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Rifornimenti', data: rifSpesa, backgroundColor: '#4f46e5' },
                    { label: 'Manutenzioni', data: maintSpesa, backgroundColor: '#f59e0b' },
                    { label: 'Lavaggi', data: washSpesa, backgroundColor: '#06b6d4' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, title: { display: true, text: 'Costo €' } } } }
        });

        // Prepara dati per grafico a torta (Divisione costi)
        const totalRif = db.log.filter(l => l.tipo === 'RIFORNIMENTO').reduce((s, c) => s + c.costo, 0);
        const totalMaint = db.log.filter(l => l.tipo === 'MANUTENZIONE').reduce((s, c) => s + c.costo, 0);
        const totalWash = db.log.filter(l => l.tipo === 'LAVAGGIO').reduce((s, c) => s + c.costo, 0);

        if(pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: ['Carburante', 'Manutenzione', 'Lavaggio'],
                datasets: [{
                    data: [totalRif, totalMaint, totalWash],
                    backgroundColor: ['#4f46e5', '#f59e0b', '#06b6d4']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Esportazione Excel (Semplice)
    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(db.log);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Storico");
        XLSX.writeFile(wb, "driveLog_Report.xlsx");
    }

    // Avvio
    renderAuto();
    renderLog();
</script>
</body>
</html>
