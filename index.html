<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIVELOG ELITE</title>
    <style>
        :root { --accent: #006064; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --muted: #8e8e93; --line: #38383a; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; -webkit-font-smoothing: antialiased; }

        /* Header Foto 108 Style */
        .hero { 
            width: 100%; height: 220px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, var(--bg) 100%), 
                        url('https://i.ibb.co/vzY3rK7/108.jpg') center/cover; 
            background-color: #000;
        }

        .container { max-width: 500px; margin: -20px auto 0; padding: 0 20px; box-sizing: border-box; }
        .view { display: none; }
        .view.active { display: block; animation: fade 0.3s ease-out; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* Card & Typography */
        .title-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #fff; padding-bottom: 10px; }
        .title { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
        .car-card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 15px; border: 1px solid var(--line); }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .label { color: var(--muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .val { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }

        /* Inputs */
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin: 15px 0 5px 5px; }
        input, select { 
            width: 100%; background: #2c2c2e; border: 1px solid var(--line); border-radius: 12px; 
            padding: 15px; color: #fff; font-size: 1rem; font-weight: 600; box-sizing: border-box;
            text-transform: uppercase; outline: none;
        }

        /* Bottoni */
        .btn-main { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 16px; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .btn-add { background: #fff; color: #000; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; cursor: pointer; }

        /* Navigazione */
        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(28,28,30,0.9); backdrop-filter: blur(20px); height: 75px; border-radius: 25px; display: flex; border: 1px solid var(--line); box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-text { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
    </style>
</head>
<body>

<div class="hero"></div>

<div class="container">
    <div id="v-home" class="view active">
        <div class="title-group">
            <div class="title">Garage</div>
            <button class="btn-add" onclick="showV('v-add-car')">+ AUTO</button>
        </div>
        <div id="car-list"></div>
    </div>

    <div id="v-add-car" class="view">
        <div class="title">Nuovo Veicolo</div>
        <label>Marca e Modello</label><input type="text" id="a-nome" placeholder="ES. ALFA ROMEO STELVIO" oninput="u(this)">
        <label>Targa</label><input type="text" id="a-targa" placeholder="AA 000 AA" maxlength="9" oninput="fmtTarga(this)">
        <label>Data di Immatricolazione</label><input type="date" id="a-imm">
        <button class="btn-main" onclick="saveCar()">Salva Veicolo</button>
    </div>

    <div id="v-spese" class="view">
        <div class="title">Registra Spesa</div>
        <label>Auto</label><select id="s-auto"></select>
        <label>Tipo Spesa</label>
        <select id="s-tipo">
            <option>BOLLO</option>
            <option>ASSICURAZIONE (RCA)</option>
            <option>REVISIONE</option>
            <option>MANUTENZIONE</option>
            <option>ALTRO</option>
        </select>
        <label>Importo €</label><input type="number" id="s-euro" placeholder="0.00">
        <label>Scadenza (se applicabile)</label><input type="date" id="s-scad">
        <button class="btn-main" onclick="saveSpesa()">Salva Spesa</button>
    </div>

    <div id="v-gas" class="view">
        <div class="title">Rifornimento</div>
        <label>Auto</label><select id="g-auto"></select>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Litri</label><input type="number" id="g-lit" oninput="calcGas()"></div>
            <div style="flex:1"><label>Prezzo/L</label><input type="number" id="g-pre" oninput="calcGas()" step="0.001"></div>
        </div>
        <div class="info-row" style="margin-top:20px; background:var(--card); padding:20px; border-radius:15px">
            <span class="label">Totale</span><span class="val" style="color:var(--accent); font-size:1.4rem">€ <span id="g-tot">0.00</span></span>
        </div>
        <button class="btn-main" onclick="saveGas()">Salva Rifornimento</button>
    </div>

    <div id="v-rep" class="view">
        <div class="title">Report Totale</div>
        <div id="rep-box"></div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showV('v-home', this)"><span>🏠</span><span class="nav-text">Garage</span></div>
    <div class="nav-item" onclick="showV('v-spese', this)"><span>💳</span><span class="nav-text">Spese</span></div>
    <div class="nav-item" onclick="showV('v-gas', this)"><span>⛽</span><span class="nav-text">Gas</span></div>
    <div class="nav-item" onclick="showV('v-rep', this)"><span>📊</span><span class="nav-text">Report</span></div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('dlog_elite_v11')) || { auto: [], spese: [], gas: [] };

    function u(el) { el.value = el.value.toUpperCase(); }
    function fmtTarga(el) {
        let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (v.length > 2) v = v.slice(0,2) + ' ' + v.slice(2);
        if (v.length > 6) v = v.slice(0,6) + ' ' + v.slice(6,8);
        el.value = v;
    }

    function showV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'v-gas' || id === 'v-spese') fillSelects();
        if(id === 'v-rep') renderRep();
    }

    function saveCar() {
        const a = { id: Date.now(), nome: document.getElementById('a-nome').value, targa: document.getElementById('a-targa').value, imm: document.getElementById('a-imm').value || '--' };
        if(!a.nome || !a.targa) return alert("DATI MANCANTI");
        db.auto.push(a);
        sync(); showV('v-home');
    }

    function fillSelects() {
        const options = db.auto.map(a => `<option value="${a.id}">${a.nome} [${a.targa}]</option>`).join('');
        document.getElementById('g-auto').innerHTML = options;
        document.getElementById('s-auto').innerHTML = options;
    }

    function saveSpesa() {
        const s = { autoId: document.getElementById('s-auto').value, tipo: document.getElementById('s-tipo').value, euro: parseFloat(document.getElementById('s-euro').value || 0), scad: document.getElementById('s-scad').value, data: new Date().toLocaleDateString() };
        db.spese.push(s);
        sync(); showV('v-home');
    }

    function calcGas() {
        const t = document.getElementById('g-lit').value * document.getElementById('g-pre').value;
        document.getElementById('g-tot').innerText = t.toFixed(2);
    }

    function saveGas() {
        const g = { autoId: document.getElementById('g-auto').value, euro: parseFloat(document.getElementById('g-tot').innerText), data: new Date().toLocaleDateString() };
        db.gas.push(g);
        sync(); showV('v-home');
    }

    function sync() { localStorage.setItem('dlog_elite_v11', JSON.stringify(db)); renderHome(); }

    function renderHome() {
        document.getElementById('car-list').innerHTML = db.auto.map(a => `
            <div class="car-card">
                <div class="car-name" style="font-weight:900; border-bottom:1px solid var(--line); padding-bottom:10px; margin-bottom:10px">${a.nome}</div>
                <div class="info-row"><span class="label">Targa</span><span class="val">${a.targa}</span></div>
                <div class="info-row"><span class="label">Immatricolazione</span><span class="val">${a.imm}</span></div>
            </div>
        `).join('');
    }

    function renderRep() {
        const tGas = db.gas.reduce((s, i) => s + i.euro, 0);
        const tSpese = db.spese.reduce((s, i) => s + i.euro, 0);
        document.getElementById('rep-box').innerHTML = `
            <div class="car-card" style="text-align:center">
                <div class="label">Spesa Complessiva</div>
                <div style="font-size:2.5rem; font-weight:900; color:var(--accent)">€ ${(tGas + tSpese).toFixed(2)}</div>
            </div>
            <div class="info-row"><span class="label">Totale Carburante</span><span class="val">€ ${tGas.toFixed(2)}</span></div>
            <div class="info-row"><span class="label">Totale Spese Fisse/Manut.</span><span class="val">€ ${tSpese.toFixed(2)}</span></div>
        `;
    }

    renderHome();
</script>
</body>
</html>
